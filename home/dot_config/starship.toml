"$schema" = 'https://starship.rs/config-schema.json'

# Performance: 500ms command timeout, no leading blank line.
command_timeout = 500
add_newline = false

# Modules not listed in format do not render; explicit disables are unnecessary.
format = """
$username\
$directory\
$git_branch\
$git_status\
$fill\
$c\
$golang\
$nodejs\
$rust\
$python\
$conda\
$time\n  \
[¾▒×¬](fg:iris) \
"""

palette = "rose-pine"

[palettes.rose-pine]
overlay = '#26233a'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ebbcba'
pine = '#31748f'
foam = '#9ccfd8'
iris = '#c4a7e7'

[directory]
format = "[$path]($style) "
style = "fg:pine"
# Show the FULL current path. truncation_length = 0 disables the "keep only the
# last N folders" limit; truncate_to_repo = false stops collapsing the path to
# the git-repo root. Home still contracts to ~ (home_symbol). To shorten again,
# raise truncation_length (e.g. 3) and/or set truncate_to_repo = true.
truncation_length = 0
truncate_to_repo = false
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
Documents = "¾░łÖ Documents"
Downloads = "¾░ćÜ Downloads"
Music = "¾░Ää Music"
Pictures = "¾░ŗ® Pictures"

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[$symbol $branch]($style) "
style = "fg:foam"
symbol = "ŅéĀ"

[git_status]
disabled = false
style = "fg:love"
format = '([$all_status$ahead_behind]($style)) '
up_to_date = '[Ō£ō](fg:iris)'
untracked = '[?\($count\)](fg:gold)'
stashed = '[\$](fg:iris)'
modified = '[!\($count\)](fg:gold)'
renamed = '[┬╗\($count\)](fg:iris)'
deleted = '[Ō£ś\($count\)]($style)'
staged = '[++\($count\)](fg:gold)'
ahead = '[ŌćĪ\(${count}\)](fg:foam)'
diverged = 'ŌćĢ[\[](fg:iris)[ŌćĪ\(${ahead_count}\)](fg:foam)[ŌćŻ\(${behind_count}\)](fg:rose)[\]](fg:iris)'
behind = '[ŌćŻ\(${count}\)](fg:rose)'

[time]
disabled = false
format = "[$time ¾░┤ł]($style)"
style = "fg:rose"
time_format = "%I:%M%P"

[username]
disabled = false
format = "[¾░¦▒ $user]($style) "
show_always = true
style_root = "fg:iris"
style_user = "fg:iris"

# === Active language modules (only languages the user actually works in) ===

[c]
style = "fg:pine"
format = "[$symbol$version]($style) "
disabled = false
symbol = "Ņś× "

[golang]
style = "fg:pine"
format = "[$symbol$version]($style) "
disabled = false
symbol = "Ņś¦ "

[nodejs]
style = "fg:pine"
format = "[$symbol$version]($style) "
disabled = false
symbol = "Ņ£ś "

[rust]
style = "fg:pine"
format = "[$symbol$version]($style) "
disabled = false
symbol = "Ņ×© "

[python]
style = "fg:pine"
format = "[$symbol$version]($style) "
disabled = false
symbol = "Ņśå "

[conda]
style = "fg:pine"
format = "[$symbol$environment]($style) "
disabled = false
symbol = '­¤ģÆ '
