# AeroSpace configuration -- i3-like tiling window manager for macOS.
# Install path (chezmoi-managed, macOS-only): ~/.config/aerospace/aerospace.toml
#
# RESERVED-CHORD SAFETY (see CLAUDE.md): AeroSpace's DEFAULT focus bindings are
# bare `alt-h/j/k/l`, which would globally shadow Neovim's `<A-h/j/k/l>` window
# navigation inside any terminal. And `alt-c` is fzf-tab's / PSFzf's "cd" chord.
# So this config uses NEITHER: window focus/move live on `ctrl-alt(-shift)`, and
# no binding uses bare `alt-h/j/k/l` or `alt-c`. Guarded by
# tests/aerospace/keymap_test.sh.
#
# AeroSpace needs Accessibility permission (System Settings -> Privacy &
# Security -> Accessibility). That is a TCC grant and cannot be scripted; grant
# it once on first launch. See tests/MANUAL.md.

config-version = 2

# Launch on login so the WM is always running (required by the migration ruling).
start-at-login = true

# Auto-reload this config on save (edit-and-see-it-live, like the symlinked stack).
auto-reload-config = true

# Keep containers sane (both are AeroSpace defaults).
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# US QWERTY key positions.
key-mapping.preset = 'qwerty'

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 8
outer.right = 8

[mode.main.binding]
# --- Focus: ctrl-alt-h/j/k/l (NOT bare alt-h/j/k/l -> nvim window nav) ---------
ctrl-alt-h = 'focus left'
ctrl-alt-j = 'focus down'
ctrl-alt-k = 'focus up'
ctrl-alt-l = 'focus right'

# --- Move the focused window --------------------------------------------------
ctrl-alt-shift-h = 'move left'
ctrl-alt-shift-j = 'move down'
ctrl-alt-shift-k = 'move up'
ctrl-alt-shift-l = 'move right'

# --- Resize -------------------------------------------------------------------
ctrl-alt-minus = 'resize smart -50'
ctrl-alt-equal = 'resize smart +50'

# --- Layout -------------------------------------------------------------------
ctrl-alt-slash = 'layout tiles horizontal vertical'
ctrl-alt-comma = 'layout accordion horizontal vertical'
ctrl-alt-f = 'fullscreen'

# --- Workspaces: alt-<digit> (no hjkl / c collision) --------------------------
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-tab = 'workspace-back-and-forth'

# --- Move focused window to a workspace: alt-shift-<digit> ---------------------
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# --- Service mode (reload / tree ops); enter with ctrl-alt-shift-; ------------
ctrl-alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
ctrl-alt-shift-h = ['join-with left', 'mode main']
ctrl-alt-shift-j = ['join-with down', 'mode main']
ctrl-alt-shift-k = ['join-with up', 'mode main']
ctrl-alt-shift-l = ['join-with right', 'mode main']
