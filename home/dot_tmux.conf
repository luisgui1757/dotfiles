# tmux config — Rose Pine, vi-mode, true-color, Ghostty/WT-friendly.

# ---- Terminal capabilities ---------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm-ghostty:RGB"
set -ga terminal-overrides ",alacritty:RGB"
set -ga terminal-overrides ",*256col*:RGB"

# Focus events so nvim's :autoread/gitsigns react when you tab back.
set -g focus-events on

# Extended keys: send Ctrl+J distinct from Enter, Ctrl+I distinct from Tab,
# etc. (tmux 3.2+). The *:extkeys terminal-feature flag tells tmux every outer
# terminal can carry the sequence. We deliberately do NOT set
# `extended-keys-format csi-u`: that option only exists on tmux 3.5+ (where
# csi-u is already the default), and older real tmux -- e.g. Ubuntu 24.04's 3.4
# -- aborts that line with `invalid option: extended-keys-format`. Harmless on
# psmux (it doesn't implement these options; unknown options are warnings there).
set -s extended-keys on
set -as terminal-features ',*:extkeys'

# ---- Behavior ----------------------------------------------------------------
# Mouse ON in tmux/psmux on purpose. Nvim keeps its own mouse off (see
# `vim.opt.mouse = ""` + the three defensive options in vim-options.lua),
# but everywhere else we want pane-switch on click, scroll-wheel into
# copy-mode, drag-resize on the pane border, and Windows Terminal-native
# selection (which psmux's mouse-selection layer also relays).
set -g mouse on
set -g escape-time 10
set -g history-limit 50000
set -g status-keys vi
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "tmux:#S #W"
set -g allow-rename off
set -g aggressive-resize on

# ---- Prefix: C-b (default; macOS eats C-Space for input-source switching) ----
set -g prefix C-b
bind C-b send-prefix

# ---- Pane management ---------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H if -F "#{==:#{window_index},#{window_base_index}}" "display-message 'no window left'" "swap-window -t -1"
bind L if -F "#{==:#{window_index},#{session_windows}}" "display-message 'no window right'" "swap-window -t +1"
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# ---- Copy-mode (vi-style, with real system-clipboard plumbing) ---------------
# OSC52 broadcasts copies via the terminal — works across SSH and into the
# host clipboard from Ghostty/Windows Terminal without any helper installed.
set -g set-clipboard on

bind -T copy-mode-vi v send -X begin-selection

# Baseline copy: OSC52 only (set-clipboard is on). NO shell runs at config-load
# time here, so psmux/ConPTY on Windows never spawns a hanging `if-shell`
# subshell while parsing this file. The native-clipboard CLI probes
# (pbcopy/wl-copy/xclip/xsel/win32yank) use `if-shell`, which MUST NOT run on
# Windows -- psmux's if-shell never returns under ConPTY, hanging the whole
# config load (the pane initializes but never finishes rendering, orphaned probe
# shells pin CPU, and a conhost leaks per session). So those probes live in the
# POSIX-only tmux.posix.conf overlay sourced below -- present as
# ~/.tmux.posix.conf on Unix/WSL, absent on Windows (`-q` => silent no-op there).
# On POSIX the overlay RE-binds `y` to the native CLI when one is installed;
# otherwise this OSC52 baseline stands. Canonical fix: guard the block, do not
# fork the config. The overlay is sourced after the fallback status config below
# so TPM/Rose Pine can own the final POSIX status bar when installed.
bind -T copy-mode-vi y send -X copy-pipe-and-cancel

# ---- Rose Pine status bar fallback ------------------------------------------
# Status-bar backgrounds are Rose Pine `base #191724` -- the same dark color as
# the terminal background. fg roles: pine status; iris inactive windows; gold+bold
# current window; base-on-rose activity; muted-on-base messages (command form base
# on gold). This is the psmux-safe fallback used when platform overlays or their
# plugin managers are missing; POSIX tmux normally loads rose-pine/tmux through
# TPM, and Windows psmux normally loads psmux-theme-rosepine through PPM. Do not
# add local theme variants here; upstream Rose Pine owns variants, and the POSIX /
# Windows overlays expose only their official `main` / `moon` / `dawn` options.
# TRANSPARENCY vs OPAQUE: Windows Terminal applies its `opacity` window-wide to
# EVERY cell regardless of the cell's bg color, so the transparent WT the fragment
# ships (`opacity: 95`) has a transparent status bar -- giving the bar a different
# bg does NOT make it opaque in WT. The owner chose the see-through look; for a
# fully solid bar set WT `opacity: 100` (whole window). macOS/Linux Ghostty use
# `background-opacity 0.95` + `background-blur-radius 15`, whose blur looks opaque
# without full opacity (WT acrylic is the analog but unreliable in a VM).
# window-status-format / -current-format are explicit `#I:#W#F` cells because
# psmux v3.3.4 cannot parse tmux's default conditional format. The current
# window color is also inlined below because psmux stores but does not render
# window-status-current-style.
set -g status-position top
set -g status-style              "fg=#31748f,bg=#191724"   # pine on base
set -g status-left-length 40
set -g status-left  "#[fg=#c4a7e7,bold] #S #[fg=#908caa,nobold]│ "
set -g status-right ""

# Inactive windows: iris (the upstream rose-pine/tmux inactive color, 8.4:1 on
# base). The current window is the gold + bold fallback standout.
setw -g window-status-style          "fg=#c4a7e7,bg=#191724"   # iris on base (inactive)
setw -g window-status-current-style  "fg=#f6c177,bold"   # gold-bold, bg inherits
setw -g window-status-activity-style "fg=#191724,bg=#ebbcba"   # base on rose
# Explicit format -- do NOT `setw -gu` here. tmux's DEFAULT
# window-status-format contains a #{?window_flags,#{window_flags}, }
# conditional, and psmux v3.3.4 does NOT parse #{?cond,a,b} syntax;
# under psmux the cell renders the literal "#{?window_flags,...}" string
# instead. `#I`/`#W`/`#F` are simple substitutions both real tmux and
# psmux handle cleanly.
#
# Current-window color is INLINED here, not just left to
# `window-status-current-style`. psmux v3.3.4 stores the
# *-current-style option but does NOT actually apply it when rendering
# window cells -- only inline `#[fg=...]` survives. Real tmux applies
# either; the inline form works on both.
setw -g window-status-format         " #I:#W#F "
setw -g window-status-current-format "#[fg=#f6c177,bold] #I:#W#F #[default]"
setw -g window-status-separator      ""

# Pane borders match rose-pine/tmux: hl_high (dark grey) inactive, gold active.
set -g pane-border-style          "fg=#524f67"
set -g pane-active-border-style   "fg=#f6c177"
set -g display-panes-active-colour "#e0def4"
set -g display-panes-colour        "#f6c177"

# Messages / command line — also role-based per rose-pine/tmux.
set -g message-style          "fg=#6e6a86,bg=#191724"   # muted on base
set -g message-command-style  "fg=#191724,bg=#f6c177"   # base on gold

# POSIX overlay: native clipboard probes plus TPM/rose-pine/tmux. It is managed
# by chezmoi on Unix/WSL only and absent on native Windows. Source it after the
# fallback status config so the plugin can own the final POSIX status bar.
source-file -q "~/.tmux.posix.conf"

# Windows/psmux overlay: managed by chezmoi on Windows only. `-q` makes this
# a silent no-op on Unix where the file is absent, so the same tmux.conf stays
# cross-platform. See tmux/tmux.windows.conf for what it sets.
source-file -q "~/.tmux.windows.conf"
