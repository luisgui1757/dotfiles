# Windows / psmux overlay -- managed as ~/.tmux.windows.conf by chezmoi.
# Only present on Windows; main tmux.conf does `source-file -q` on it, so this
# file is invisible to Unix tmux. Keep it psmux-specific.

# Make psmux launch PowerShell 7 (pwsh) instead of its cmd.exe default. Without
# this, fresh panes spawn cmd -- which has no PSReadLine at all -- so the
# "clever history prediction" and MenuComplete features were never even loaded.
# (Verify in a pane via: (Get-Process -Id $PID).Name -- should be `pwsh`.)
set -g default-shell pwsh

# psmux v3.3.x does not support tmux's `terminal-features` option, so do not
# try to force RGB here. The generated bar uses explicit 24-bit Rose Pine hex
# colors; if psmux color support regresses, fix it with a psmux-supported knob
# after proving the source of truth on Windows.

# psmux deliberately resets PSReadLine prediction settings during pane init
# unless this is on (psmux issue #150 -- fresh psmux panes show
# PredictionSource=None even when the profile asks for HistoryAndPlugin).
# With allow-predictions on, the profile's PredictionSource=HistoryAndPlugin +
# PredictionViewStyle=ListView survive into fresh panes.
set -g allow-predictions on

# psmux's own client-side drag-selection layer is INDEPENDENT of `mouse`
# (psmux issue #245 / PR #212). With tmux `mouse on` + psmux's default
# `mouse-selection on`, drag-select only paints while the button is held
# and clears on release -- so Windows Terminal-native selection looks
# broken. Turning psmux's selection layer off (while leaving tmux mouse
# fully on) keeps tmux pane-focus / scroll-wheel / drag-resize working AND
# returns ownership of click+drag to Windows Terminal so its native
# selection persists after release (Ctrl+Shift+C copies). The
# `scroll-enter-copy-mode on` keeps wheel-scroll entering tmux's copy-mode
# (a real feature we want, separate from drag-selection).
set -g mouse-selection off
set -g pwsh-mouse-selection off
set -g scroll-enter-copy-mode on

# Native-Windows clipboard. The cross-platform tmux.conf binds copy-mode `y` to
# an OSC52 baseline, but OSC52 passthrough through Windows Terminal + psmux +
# ConPTY is not guaranteed, so override `y` here with the built-in `clip.exe`.
# clip.exe ships with Windows (zero dependency, unlike the WSL-only win32yank),
# and -- unlike the load-time `if-shell` probes -- this command runs only at COPY
# time, so it does NOT reintroduce the psmux config-load freeze. set-clipboard is
# still on, so OSC52 also fires as a belt-and-suspenders backup. This is the
# native-Windows yank: at the pinned psmux/psmux-plugins commit there is no active
# top-level psmux-yank port (only a retired _trash/psmux-yank), so clip.exe IS our
# deterministic Windows yank equivalent.
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"

# ---- Rose Pine status bar (Omer-shaped, repo-owned generated config) ---------
# The bar is generated by tmux/psmux-rose-pine.ps1 and deployed by chezmoi as
# ~/.tmux.rose-pine.{main,moon,dawn}.conf -- the SAME artifacts POSIX tmux
# sources, so the pill bar is byte-identical across platforms. We source the
# selected variant synchronously during config parse, matching how psmux applies
# plugin.conf files natively; startup does not depend on async `run`.
# We deliberately do NOT use a psmux theme *plugin*: the community
# psmux-theme-rosepine renders a different powerline (arrow-chevron) bar, and the
# bash rose-pine/tmux cannot run on psmux at all.
# Switch flavor live with:
#   psmux set -g @rosepine-variant moon; psmux source-file ~/.tmux.windows.conf
set -go @rosepine-variant 'main'
%if "#{==:#{@rosepine-variant},moon}"
source-file ~/.tmux.rose-pine.moon.conf
%elif "#{==:#{@rosepine-variant},dawn}"
source-file ~/.tmux.rose-pine.dawn.conf
%else
source-file ~/.tmux.rose-pine.main.conf
%endif

# The shared tmux.conf already sets `status-position top`; reassert it here after
# the sourced variant in case a future generated artifact drifts.
set -g status-position top

# ---- psmux session plugin (resurrect only) ----------------------------------
# The psmux plugin PORTS live in the psmux/psmux-plugins monorepo, which
# install-deps.ps1 vendors at an immutable pinned commit into ~/.psmux/plugins/
# (we do NOT use PPM: it clones monorepo HEAD -- unpinned -- and rewrites managed
# config files). We source the vendored plugin.conf directly, the same
# "vendor + source, skip the plugin manager" pattern the theme uses. The
# plugin.conf hardcodes its own ~/.psmux/plugins/psmux-resurrect/scripts/ paths,
# so the vendor location is fixed. psmux-resurrect's plugin.conf only adds two
# key bindings (Prefix+Ctrl-s / Prefix+Ctrl-r) at load time -- no load-time
# if-shell, no auto hooks -- so it respects the psmux ConPTY-freeze boundary.
#
# psmux-continuum is INTENTIONALLY NOT SHIPPED here. Its plugin.conf registers
# load-time `set-hook -g session-created`/`client-attached` that `run-shell` pwsh
# scripts (auto-save loop + auto-restore). That was authored on macOS and has NOT
# been verified on a real Windows psmux host: until someone proves those hooks do
# not freeze ConPTY, do not spawn runaway pwsh loops, and survive restart/reattach,
# continuum stays a blocked follow-up (see CLAUDE.md). POSIX tmux still gets
# tmux-continuum, which is testable on Linux.
source-file ~/.psmux/plugins/psmux-resurrect/plugin.conf
