# Windows psmux entrypoint -- managed as ~/.psmux.conf by chezmoi.
#
# psmux checks `warm off` with a shallow pre-server scan of the first config file
# it finds. Keep this in ~/.psmux.conf, before sourcing ~/.tmux.conf, so psmux
# cannot claim a warm server that loaded stale theme/config files before chezmoi
# updated them.
set -g warm off
source-file ~/.tmux.conf
