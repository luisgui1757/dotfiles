# POSIX overlay -- managed as ~/.tmux.posix.conf by chezmoi on Unix/WSL only.
# It is ABSENT on Windows; main tmux.conf does `source-file -q` on it, so this
# file is invisible to psmux/ConPTY (silent no-op). Keep it POSIX-specific.
#
# Why this lives in its own file: `if-shell` spawns a shell at config-LOAD time.
# Under psmux/ConPTY on Windows that shell never returns -- it hangs the whole
# config load (the pane initializes but never finishes rendering, the orphaned
# probe shells pin CPU, and a conhost leaks per session). On Unix/WSL `if-shell`
# + /bin/sh behave normally, so the native-clipboard probes are safe here.
#
# main tmux.conf already binds copy-mode `y` to an OSC52 baseline. These probes
# only RE-bind `y` to the platform's native clipboard CLI when one is installed,
# so a native paste still works even where the terminal swallows OSC52. Order:
# pbcopy (macOS) -> wl-copy (Wayland) -> xclip -> xsel -> win32yank (WSL). Each
# guards on the higher-priority tools being absent so exactly one wins; when
# none exist the OSC52 baseline in tmux.conf stands.
if-shell 'command -v pbcopy >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && command -v wl-copy >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1 && command -v xclip >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1 && ! command -v xclip >/dev/null 2>&1 && command -v xsel >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel -i -b"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1 && ! command -v xclip >/dev/null 2>&1 && ! command -v xsel >/dev/null 2>&1 && command -v win32yank.exe >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "win32yank.exe -i --crlf"'

# ---- POSIX tmux plugins -----------------------------------------------------
# setup.sh installs these as repo-managed pinned checkouts under this root:
#   tpm -> tmux-plugins/tpm
#   tmux -> rose-pine/tmux  (TPM uses the repository basename as plugin dir)
# Missing plugins do not break config load; the shared tmux.conf fallback status
# remains in force until setup installs the pinned checkouts.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.local/share/dotfiles/tmux-plugins"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'rose-pine/tmux'
# Official Rose Pine variants are `main`, `moon`, and `dawn`. `main` is the repo
# default; changing this line is the POSIX variant surface.
set -g @rose_pine_variant 'main'
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'
set -g @rose_pine_user 'on'
set -g @rose_pine_directory 'on'
set -g @rose_pine_date_time ''
if-shell 'test -x "$HOME/.local/share/dotfiles/tmux-plugins/tpm/tpm"' \
    'run-shell "$HOME/.local/share/dotfiles/tmux-plugins/tpm/tpm"'
