"$schema" = 'https://starship.rs/config-schema.json'

# Performance: command timeout, no leading blank line. Raised from starship's
# 500ms default to 2000ms so git modules are not killed mid-run in large / Git
# LFS repos -- starship killing git mid-filter-handshake surfaces to the terminal
# as "writing filter-process initialization failed: ... pipe is being closed".
command_timeout = 2000
add_newline = false

# Modules not listed in format do not render; explicit disables are unnecessary.
format = """
$username\
$directory\
$git_branch\
$git_status\
$fill\
$c\
$golang\
$nodejs\
$rust\
$python\
$conda\
$time\n  \
[󱞪](fg:iris) \
"""

palette = "rose-pine"

[palettes.rose-pine]
overlay = '#26233a'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ebbcba'
pine = '#31748f'
foam = '#9ccfd8'
iris = '#c4a7e7'

[directory]
format = "[$path]($style) "
style = "fg:pine"
# Show the FULL current path. truncation_length = 0 disables the "keep only the
# last N folders" limit; truncate_to_repo = false stops collapsing the path to
# the git-repo root. Home still contracts to ~ (home_symbol). To shorten again,
# raise truncation_length (e.g. 3) and/or set truncate_to_repo = true.
truncation_length = 0
truncate_to_repo = false
truncation_symbol = "…/"

[directory.substitutions]
Documents = "󰈙 Documents"
Downloads = "󰇚 Downloads"
Music = "󰎄 Music"
Pictures = "󰋩 Pictures"

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[$symbol $branch]($style) "
style = "fg:foam"
symbol = ""

[git_status]
disabled = false
style = "fg:love"
format = '([$all_status$ahead_behind]($style)) '
up_to_date = '[✓](fg:iris)'
untracked = '[?\($count\)](fg:gold)'
stashed = '[\$](fg:iris)'
modified = '[!\($count\)](fg:gold)'
renamed = '[»\($count\)](fg:iris)'
deleted = '[✘\($count\)]($style)'
staged = '[++\($count\)](fg:gold)'
ahead = '[⇡\(${count}\)](fg:foam)'
diverged = '⇕[\[](fg:iris)[⇡\(${ahead_count}\)](fg:foam)[⇣\(${behind_count}\)](fg:rose)[\]](fg:iris)'
behind = '[⇣\(${count}\)](fg:rose)'

[time]
disabled = false
format = "[$time 󰴈]($style)"
style = "fg:rose"
time_format = "%I:%M%P"

[username]
disabled = false
format = "[󰧱 $user]($style) "
show_always = true
style_root = "fg:iris"
style_user = "fg:iris"

# === Active language modules (only languages the user actually works in) ===

[c]
style = "fg:pine"
format = "[$symbol$version]($style) "
disabled = false
symbol = " "

[golang]
style = "fg:pine"
format = "[$symbol$version]($style) "
disabled = false
symbol = " "

[nodejs]
style = "fg:pine"
format = "[$symbol$version]($style) "
disabled = false
symbol = " "

[rust]
style = "fg:pine"
format = "[$symbol$version]($style) "
disabled = false
symbol = " "

[python]
style = "fg:pine"
format = "[$symbol$version]($style) "
disabled = false
symbol = " "

[conda]
style = "fg:pine"
format = "[$symbol$environment]($style) "
disabled = false
symbol = '🅒 '
