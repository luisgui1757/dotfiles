name: wsl2-canary

on:
  workflow_dispatch:
  schedule:
    - cron: "41 4 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-sh-wsl2:
    name: setup.sh / WSL2 Ubuntu-24.04 (canary)
    runs-on: windows-2025
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: Vampire/setup-wsl@d1da7f2c0322a5ee4f24975344f67fc0f5baf364 # v7.0.0
        with:
          distribution: Ubuntu-24.04
          wsl-version: 2
          # Scheduled/manual greenfield proof must not inherit a prebuilt WSL
          # distro cache. Ordinary PR lanes retain their targeted caches.
          use-cache: "false"
          update: "true"
          additional-packages: git ca-certificates curl bash sudo nix-bin
          wsl-shell-user: dotfiles

      - name: Run setup.sh inside WSL2
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          sudo mkdir -p /etc/nix
          printf '%s\n' 'experimental-features = nix-command flakes' | sudo tee /etc/nix/nix.conf >/dev/null
          nix --version
          repo="$(wslpath "$GITHUB_WORKSPACE")"
          cd "$repo"
          ./setup.sh --all 2>&1 | tee /tmp/dotfiles-wsl2-setup.log
          if grep -Fq "skipped: Phase 3-5" /tmp/dotfiles-wsl2-setup.log; then
            echo "setup.sh skipped Phase 3-5" >&2
            exit 1
          fi
          if grep -Eq '^[[:space:]]*FAIL:' /tmp/dotfiles-wsl2-setup.log; then
            echo "setup.sh emitted a FAIL marker" >&2
            exit 1
          fi
          grep -F "Phase 6/6" /tmp/dotfiles-wsl2-setup.log >/dev/null
          command -v nvim >/dev/null 2>&1
          command -v lazygit >/dev/null 2>&1
          command -v cmake >/dev/null 2>&1
          command -v lsd >/dev/null 2>&1
          test -r "$HOME/.local/share/dotfiles/zsh-plugins/fzf-tab/fzf-tab.plugin.zsh"
          test -r "$HOME/.local/share/dotfiles/zsh-plugins/zsh-autosuggestions/zsh-autosuggestions.zsh"
          nvim --version | head -n 1
