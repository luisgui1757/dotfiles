name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_BINSTALL_COMMIT: 732870f031d2fb36309d0deaf36abcc704a7be65
  CARGO_BINSTALL_INSTALLER_SHA256: d3a93702160e0ec03e2a4e996855db1f01adee801fb84a43add24e0877ef8eae
  CHEZMOI_VERSION: v2.70.5
  CHEZMOI_LINUX_X86_64_SHA256: 6a76a0ac3718f0d45b34b4b57067f9556f8f6042e3da710a3c496838362aca14
  CHEZMOI_LINUX_ARM64_SHA256: 4f4f31d0a10ed3b955e814a5ae20075426e27c9d3a09f536bfa4a6c8718353f2
  CHEZMOI_DARWIN_X86_64_SHA256: 6676e06f094e5b0860bd3642d203b71869b5cbeb8089155886bc54c1096b9d3c
  CHEZMOI_DARWIN_ARM64_SHA256: c3531896769175089b9b2e9cf99b15a2357427f776289b66583a2432d69cd3cc
  CHEZMOI_WINDOWS_X86_64_SHA256: ebc29455dc9106e8d2d980708b45bd3120e44c7d5e6a06787ff307faaa0681a8
  NVIM_LINUX_VERSION: v0.12.3
  NVIM_LINUX_X86_64_SHA256: c441b547142860bf01bcce39e36cbed185c41112813e15443b16e5237750724d
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  STARSHIP_VERSION: v1.25.1
  STARSHIP_LINUX_X86_64_SHA256: 4488c11ca632327d1f1f16fb2f102c0646094c35479cd5435991385da43c61ac
  TREE_SITTER_CLI_LINUX_VERSION: v0.26.9
  TREE_SITTER_CLI_LINUX_X86_64_SHA256: 0ea5daaef79145fe73786f0e3cdc43b62b22ddb36f7f6676c9f8bb72434d78e9

jobs:
  ubuntu:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Nix (flakes enabled)
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Dogfood install-deps dry run
        run: |
          set -euxo pipefail
          ./install-deps.sh --dry-run --all
      - name: Dogfood setup dry run
        run: |
          set -euxo pipefail
          ./setup.sh --dry-run --all
      - name: Install deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl shellcheck tmux zsh bats python3-pip unzip
          curl -fsSL "https://github.com/starship/starship/releases/download/${STARSHIP_VERSION}/starship-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/starship.tar.gz
          printf '%s  %s\n' "$STARSHIP_LINUX_X86_64_SHA256" /tmp/starship.tar.gz | sha256sum -c -
          sudo tar -xzf /tmp/starship.tar.gz -C /usr/local/bin starship
          starship --version
          curl -fsSL "https://github.com/tree-sitter/tree-sitter/releases/download/${TREE_SITTER_CLI_LINUX_VERSION}/tree-sitter-cli-linux-x64.zip" -o /tmp/tree-sitter-cli-linux-x64.zip
          printf '%s  %s\n' "$TREE_SITTER_CLI_LINUX_X86_64_SHA256" /tmp/tree-sitter-cli-linux-x64.zip | sha256sum -c -
          rm -rf /tmp/tree-sitter-cli
          mkdir -p /tmp/tree-sitter-cli
          unzip -oq /tmp/tree-sitter-cli-linux-x64.zip -d /tmp/tree-sitter-cli
          sudo install -m 0755 /tmp/tree-sitter-cli/tree-sitter /usr/local/bin/tree-sitter
          tree-sitter --version
          curl -fsSL "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/${CARGO_BINSTALL_COMMIT}/install-from-binstall-release.sh" -o /tmp/cargo-binstall.sh
          printf '%s  %s\n' "$CARGO_BINSTALL_INSTALLER_SHA256" /tmp/cargo-binstall.sh | sha256sum -c -
          bash /tmp/cargo-binstall.sh
          # taplo-cli 0.10.0 has no cargo-binstall prebuilt (quickinstall 404) and
          # fails to source-build on the current runner Rust (time-crate E0119), so
          # pin 0.9.3, which has a quickinstall prebuilt and installs without compiling.
          "$HOME/.cargo/bin/cargo-binstall" -y taplo-cli@0.9.3 hyperfine
          python3 -m pip install --user --break-system-packages --disable-pip-version-check yamllint editorconfig-checker
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

          # PowerShell so tests/static/ps1_parse.sh catches .ps1 syntax regressions.
          source /etc/os-release
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -o /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          rm /tmp/packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell
          pwsh -NoProfile -Command '$PSVersionTable.PSVersion'

          # Neovim pinned release tarball avoids AppImage/FUSE and old asset-name drift.
          curl -fsSL "https://github.com/neovim/neovim/releases/download/${NVIM_LINUX_VERSION}/nvim-linux-x86_64.tar.gz" -o /tmp/nvim-linux-x86_64.tar.gz
          printf '%s  %s\n' "$NVIM_LINUX_X86_64_SHA256" /tmp/nvim-linux-x86_64.tar.gz | sha256sum -c -
          sudo rm -rf /opt/nvim-linux-x86_64
          sudo tar -xzf /tmp/nvim-linux-x86_64.tar.gz -C /opt
          sudo ln -sf /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim
          nvim --version | head -n 1
      - name: Static lint
        run: |
          set -euo pipefail
          make test-static
      - name: Renovate schema
        run: |
          set -euo pipefail
          make validate-renovate
      - name: shellcheck
        run: |
          set -euo pipefail
          make lint
      - name: Shell smoke
        run: |
          set -euo pipefail
          make test-shell
      - name: Starship render + perf
        run: |
          set -euo pipefail
          make test-starship
      - name: Tmux load
        run: |
          set -euo pipefail
          make test-tmux
      - name: Nvim plenary busted
        run: |
          set -euo pipefail
          make test-nvim
      - name: WezTerm smoke
        run: |
          set -euo pipefail
          make test-wezterm
      - name: AeroSpace static checks
        run: |
          set -euo pipefail
          make test-aerospace
      - name: Nix integration smoke
        run: |
          set -euo pipefail
          make test-nix

  macos:
    runs-on: macos-26
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Nix (flakes enabled)
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Dogfood install-deps dry run
        run: |
          set -euxo pipefail
          ./install-deps.sh --dry-run --all
      - name: Dogfood setup dry run
        run: |
          set -euxo pipefail
          ./setup.sh --dry-run --all
      - name: Install deps
        run: |
          set -euxo pipefail
          brew install shellcheck neovim tmux starship tree-sitter-cli taplo hyperfine yamllint editorconfig-checker bats-core
      - name: Make test (full matrix)
        run: |
          set -euo pipefail
          make test

  windows:
    runs-on: windows-2025
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Dogfood install-deps dry run
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          .\install-deps.ps1 -DryRun -All
      - name: Dogfood setup dry run
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          .\setup.ps1 -DryRun -All
      - name: Install deps
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $WarningPreference = 'Stop'
          if (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue) {
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          }
          function Install-ModuleWithRetry {
            param(
              [Parameter(Mandatory)][string]$Name,
              [string]$MinimumVersion = ''
            )
            $installArgs = @{
              Name = $Name
              Force = $true
              Scope = 'CurrentUser'
              SkipPublisherCheck = $true
              ErrorAction = 'Stop'
            }
            if (-not [string]::IsNullOrWhiteSpace($MinimumVersion)) {
              $installArgs.MinimumVersion = $MinimumVersion
            }
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                Install-Module @installArgs
                return
              } catch {
                if ($attempt -eq 3) { throw }
                Write-Host ("WARN: Install-Module {0} failed on attempt {1}/3: {2}" -f $Name, $attempt, $_.Exception.Message)
                Start-Sleep -Seconds (5 * $attempt)
              }
            }
          }
          $pester = Get-Module -ListAvailable Pester |
            Where-Object { $_.Version -ge [version]'5.0.0' } |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if (-not $pester) {
            Install-ModuleWithRetry -Name Pester -MinimumVersion 5.5.0
          }
          Install-ModuleWithRetry -Name PSScriptAnalyzer
          choco install neovim -y
          $nvim = Get-Command nvim -ErrorAction SilentlyContinue
          if (-not $nvim) {
            $candidatePaths = @(
              "$env:ProgramFiles\Neovim\bin",
              "C:\tools\neovim\nvim-win64\bin"
            )
            foreach ($candidate in $candidatePaths) {
              if (Test-Path (Join-Path $candidate 'nvim.exe')) {
                Add-Content -Path $env:GITHUB_PATH -Value $candidate
                $env:PATH = "$candidate;$env:PATH"
                break
              }
            }
          } else {
            Add-Content -Path $env:GITHUB_PATH -Value (Split-Path -Parent $nvim.Source)
          }
          nvim --version | Select-Object -First 1
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          Import-Module PSScriptAnalyzer -Force
          Get-Module Pester, PSScriptAnalyzer | Format-Table Name,Version,Path -AutoSize
      - name: Windows test suite
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          .\test.ps1

  chezmoi-parity:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl git python3
          scripts/install-pinned-chezmoi.sh "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/chezmoi" --version
      - name: Template tests
        run: |
          set -euo pipefail
          PATH="$HOME/.local/bin:$PATH" bash tests/migration/template_test.sh
      - name: Parity gate
        run: |
          set -euo pipefail
          PATH="$HOME/.local/bin:$PATH" bash tests/migration/parity_gate.sh
      - name: Greenfield round-trip uninstall
        run: |
          set -euo pipefail
          PATH="$HOME/.local/bin:$PATH" bash tests/migration/greenfield_roundtrip.sh
      - name: Uninstall safety (adversarial)
        run: |
          set -euo pipefail
          PATH="$HOME/.local/bin:$PATH" bash tests/migration/uninstall_safety_test.sh
      - name: Windows template render/parse/merge (pwsh)
        run: |
          set -euo pipefail
          # the ubuntu runner ships pwsh, so this exercises the Windows-only
          # .ps1.tmpl scripts (render + parse + WT merge) that ps1_parse.sh
          # cannot see; the test self-skips if pwsh is ever absent.
          PATH="$HOME/.local/bin:$PATH" bash tests/migration/windows_render_test.sh
      - name: Oracle (negative) tests
        run: |
          set -euo pipefail
          PATH="$HOME/.local/bin:$PATH" bash tests/migration/oracle_test.sh

  chezmoi-parity-macos:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install chezmoi
        run: |
          set -euxo pipefail
          command -v python3
          command -v git
          scripts/install-pinned-chezmoi.sh "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/chezmoi" --version
      - name: Template tests
        run: |
          set -euo pipefail
          PATH="$HOME/.local/bin:$PATH" bash tests/migration/template_test.sh
      - name: Parity gate
        run: |
          set -euo pipefail
          PATH="$HOME/.local/bin:$PATH" bash tests/migration/parity_gate.sh
      - name: Greenfield round-trip uninstall
        run: |
          set -euo pipefail
          PATH="$HOME/.local/bin:$PATH" bash tests/migration/greenfield_roundtrip.sh
      - name: Uninstall safety (adversarial)
        run: |
          set -euo pipefail
          PATH="$HOME/.local/bin:$PATH" bash tests/migration/uninstall_safety_test.sh
      - name: Oracle (negative) tests
        run: |
          set -euo pipefail
          PATH="$HOME/.local/bin:$PATH" bash tests/migration/oracle_test.sh

  chezmoi-parity-windows:
    runs-on: windows-2025
    # Heaviest job: a full Windows chezmoi apply plus the WT managed-subset
    # deep-compare. Borderline at 25 on a slow runner (one cancellation), so
    # give headroom.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install chezmoi
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $true
          }

          $bin = Join-Path $env:USERPROFILE 'bin'
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          $version = $env:CHEZMOI_VERSION.TrimStart('v')
          $asset = "chezmoi_${version}_windows_amd64.zip"
          $zip = Join-Path $env:TEMP $asset
          $extract = Join-Path $env:TEMP "chezmoi-$([guid]::NewGuid())"
          Invoke-WebRequest -UseBasicParsing -Uri "https://github.com/twpayne/chezmoi/releases/download/$env:CHEZMOI_VERSION/$asset" -OutFile $zip
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToLowerInvariant()
          if ($actual -ne $env:CHEZMOI_WINDOWS_X86_64_SHA256) {
            throw "checksum mismatch for ${asset}: got $actual expected $env:CHEZMOI_WINDOWS_X86_64_SHA256"
          }
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          $chezmoi = Get-ChildItem -Path $extract -Filter 'chezmoi.exe' -File -Recurse | Select-Object -First 1
          if (-not $chezmoi) {
            throw "chezmoi.exe missing from $asset"
          }
          Copy-Item -LiteralPath $chezmoi.FullName -Destination (Join-Path $bin 'chezmoi.exe') -Force

          Add-Content -Path $env:GITHUB_PATH -Value $bin
          $env:PATH = "$bin;$env:PATH"
          $version = (& (Join-Path $bin 'chezmoi.exe') --version) -join "`n"
          Write-Host $version
          if ($version -notmatch [regex]::Escape($env:CHEZMOI_VERSION)) {
            throw "chezmoi version output does not include $env:CHEZMOI_VERSION"
          }
      - name: Windows chezmoi apply parity
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $true
          }
          .\tests\migration\windows_apply_test.ps1
      - name: Windows greenfield round-trip uninstall
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $true
          }
          .\tests\migration\windows_roundtrip_test.ps1
