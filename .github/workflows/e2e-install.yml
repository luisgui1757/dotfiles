name: e2e-install

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  linux-container-install:
    name: e2e containers / ${{ matrix.id }}
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    strategy:
      matrix:
        include:
          # Why a container AND a hosted setup.sh/ubuntu job? They prove
          # different install paths. The hosted ubuntu-24.04 runner has
          # Linuxbrew available, so setup.sh can take the brew branch. This
          # clean-image job is the only required proof of the native apt path:
          # non-root user, no Linuxbrew bootstrap, pinned Neovim tarball,
          # fd-find -> fd shim, pinned lazygit release, zsh plugins, and apt fallbacks.
          # It is a fresh-install fixture, not a devcontainer. There is no
          # macOS/Windows analog to add for symmetry: Docker cannot model
          # macOS, and Windows containers do not model the real
          # Scoop/winget/Developer-Mode desktop install surface.
          # Ubuntu only -- the supported Linux / WSL2 target. Re-adding a distro
          # means adding a matrix entry here and its root prep in container-e2e.sh.
          - id: ubuntu-24.04
            image: ubuntu:24.04
            pm: apt
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Real native package-manager install in container
        run: |
          set -euo pipefail
          # The in-container logic lives in tests/ci/container-e2e.sh (a committed
          # file) instead of inline YAML, to avoid fragile nested shell quoting.
          docker run --rm \
            --env EXPECTED_PM="${{ matrix.pm }}" \
            --volume "${{ github.workspace }}:/repo:ro" \
            "${{ matrix.image }}" \
            bash /repo/tests/ci/container-e2e.sh

  setup-sh:
    name: setup.sh / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false   # surface both OS results independently
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/Homebrew
            ~/Library/Caches/Homebrew
            ~/.cache/nvim
            ~/.local/share/nvim/lazy
            ~/.local/share/nvim/mason
            ~/Library/Caches/nvim
            ~/Library/Application Support/nvim/lazy
            ~/Library/Application Support/nvim/mason
          key: ${{ runner.os }}-setup-sh-${{ hashFiles('nvim/lazy-lock.json', 'nvim/lua/plugins/**/*.lua') }}
          restore-keys: |
            ${{ runner.os }}-setup-sh-

      - name: Run setup.sh end-to-end
        run: |
          set -euo pipefail
          setup_log="$RUNNER_TEMP/setup-sh.log"
          ./setup.sh --all 2>&1 | tee "$setup_log"
          if grep -Fq "skipped: Phase 3-5" "$setup_log"; then
            echo "setup.sh skipped Phase 3-5" >&2
            exit 1
          fi
          if grep -Eq '^[[:space:]]*FAIL:' "$setup_log"; then
            echo "setup.sh emitted a FAIL marker" >&2
            exit 1
          fi
          # Warnings-as-errors is enforced precisely (shellcheck, PSScriptAnalyzer,
          # pipefail, exit codes, FAIL markers, and the explicit assertions below).
          grep -F "Phase 3/5" "$setup_log" >/dev/null
          grep -F "Phase 4/5" "$setup_log" >/dev/null
          grep -F "Phase 5/5" "$setup_log" >/dev/null

      - name: Post-install assertions
        run: |
          set -euo pipefail
          # Mirror a fresh login shell: load Homebrew so the tools
          # setup.sh installed resolve (this separate CI step does not inherit them).
          for p in /opt/homebrew /usr/local /home/linuxbrew/.linuxbrew "$HOME/.linuxbrew"; do
            [ -x "$p/bin/brew" ] && eval "$("$p/bin/brew" shellenv)" && break
          done
          fail() { echo "FAIL: $*" >&2; exit 1; }
          assert_file_content() {
            local path="$1" expected="$2"
            [[ -e "$path" ]] || fail "$path does not exist"
            [[ -f "$path" ]] || fail "$path does not dereference to a file"
            cmp -s "$path" "$expected" || fail "$path content differs from $expected"
          }
          assert_dir_resolves() {
            local path="$1" expected="$2" actual
            [[ -d "$path" ]] || fail "$path is not a directory"
            actual="$(cd "$path" && pwd -P)"
            expected="$(cd "$expected" && pwd -P)"
            [[ "$actual" == "$expected" ]] || fail "$path resolves to $actual, expected $expected"
          }
          run_nvim_checked() {
            local label="$1"; shift
            local log="$RUNNER_TEMP/nvim-${label}.log"
            set +e
            nvim --headless "$@" 2>&1 | tee "$log"
            local rc=${PIPESTATUS[0]}
            set -e
            if [[ "$rc" -ne 0 ]]; then
              fail "nvim $label exited $rc"
            fi
            # nvim's exit code (checked above) is the real signal; deprecated-API
            # usage is guarded by tests/static/invariants_test.sh. $log kept for logs.
          }
          assert_mason_tool() {
            local tool="$1"; shift
            local dir name
            for dir in "$HOME/.local/share/nvim/mason/bin" "$HOME/Library/Application Support/nvim/mason/bin"; do
              for name in "$@"; do
                if [[ -f "$dir/$name" ]]; then
                  return 0
                fi
              done
            done
            fail "Mason did not install $tool into an expected mason/bin directory"
          }
          command -v nvim >/dev/null 2>&1 || fail "nvim is not on PATH"
          command -v lazygit >/dev/null 2>&1 || fail "lazygit is not on PATH"
          command -v cmake >/dev/null 2>&1 || fail "cmake is not on PATH"
          command -v lsd >/dev/null 2>&1 || fail "lsd is not on PATH"
          nvim_line="$(nvim --version | head -n 1)"
          case "$nvim_line" in
            "NVIM v0.12"*|"NVIM v1."*) ;;
            *) fail "nvim version is below 0.12: $nvim_line" ;;
          esac
          repo="$(pwd -P)"
          assert_dir_resolves "$HOME/.config/nvim" "$repo/nvim"
          assert_file_content "$HOME/.config/nvim/init.lua" "$repo/nvim/init.lua"
          assert_file_content "$HOME/.config/starship.toml" "$repo/starship/starship.toml"
          assert_file_content "$HOME/.tmux.conf" "$repo/tmux/tmux.conf"
          assert_file_content "$HOME/.zshenv" "$repo/shells/zshenv"
          assert_file_content "$HOME/.zshrc" "$repo/shells/zshrc"
          plugin_root="$HOME/.local/share/dotfiles/zsh-plugins"
          [[ -r "$plugin_root/fzf-tab/fzf-tab.plugin.zsh" ]] || fail "fzf-tab plugin file missing"
          [[ -r "$plugin_root/zsh-autosuggestions/zsh-autosuggestions.zsh" ]] || fail "zsh-autosuggestions plugin file missing"
          run_nvim_checked lazy "+Lazy! restore" "+qa"
          DOTFILES_TREESITTER_SYNC_INSTALL=1 run_nvim_checked treesitter -u "$repo/nvim/init.lua" -c "lua require('lazy').load({ plugins = { 'nvim-treesitter' } })" +qa
          run_nvim_checked mason "+MasonToolsInstallSync" "+qa"
          assert_mason_tool "lua-language-server" lua-language-server lua-language-server.cmd lua-language-server.exe
          assert_mason_tool "stylua" stylua stylua.cmd stylua.exe
          # Tier 2 language smoke: parser support, Tree-sitter captures, AND LSP-attach,
          # both STRICT. The treesitter-highlight bug that previously forced
          # LSP-attach to report-only is fixed canonically (nvim-bundled langs are
          # no longer installed by nvim-treesitter), so a non-gated server that
          # does not attach -- or a parser-backed fixture without captures -- now cquits.
          # run_nvim_checked fails on the nonzero exit. The trailing +qa is
          # insurance if the probe ever leaves nvim alive.
          DOTFILES_LSP_SMOKE=strict run_nvim_checked lsp-smoke -u "$repo/nvim/init.lua" -c "luafile $repo/tests/nvim/lsp_smoke.lua" +qa

  setup-ps1:
    name: setup.ps1 / windows-2025
    runs-on: windows-2025
    timeout-minutes: 90
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~\scoop\cache
            ~\AppData\Local\nvim-data\lazy
            ~\AppData\Local\nvim-data\mason
            ~\AppData\Local\nvim-data\site
          key: Windows-setup-ps1-${{ hashFiles('nvim/lazy-lock.json', 'nvim/lua/plugins/**/*.lua') }}
          restore-keys: |
            Windows-setup-ps1-

      - name: Run setup.ps1 end-to-end
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $setupLog = Join-Path $env:RUNNER_TEMP 'setup-ps1.log'
          $global:LASTEXITCODE = 0
          # *>&1 (not 2>&1): setup.ps1 prints its "Phase N/4" headers via Write-Host
          # (the Information stream), which 2>&1 would not capture for the greps below.
          & .\setup.ps1 -All *>&1 | Tee-Object -FilePath $setupLog
          if ($LASTEXITCODE -ne 0) {
            throw "setup.ps1 exited $LASTEXITCODE"
          }
          $content = Get-Content -Raw -LiteralPath $setupLog
          if ($content -match 'skipped: Phase 3-5') {
            throw 'setup.ps1 skipped Phase 3-5'
          }
          if ($content -match '(?m)^\s*FAIL:') {
            throw 'setup.ps1 emitted a FAIL marker'
          }
          if (($content -notmatch 'Phase 3/5') -or ($content -notmatch 'Phase 4/5') -or ($content -notmatch 'Phase 5/5')) {
            throw 'setup.ps1 did not run all nvim phases'
          }
          # Warnings-as-errors enforced precisely through PSScriptAnalyzer, exit
          # codes, FAIL markers, and explicit assertions.

      - name: Post-install assertions
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          # Mirror a fresh shell: re-derive PATH from the registry + scoop shims so
          # the tools setup.ps1 installed resolve in this separate CI step.
          $scoopRoot = if ($env:SCOOP) { $env:SCOOP } else { Join-Path $env:USERPROFILE 'scoop' }
          $pathParts = @(Join-Path $scoopRoot 'shims')
          foreach ($scope in 'Machine', 'User') {
            $p = [Environment]::GetEnvironmentVariable('PATH', $scope)
            if ($p) { $pathParts += ($p -split ';') }
          }
          $pathParts += ($env:PATH -split ';')
          $env:PATH = ($pathParts | Where-Object { $_ } | Select-Object -Unique) -join ';'
          function Assert-NvimSymlink {
              param([string]$Path, [string]$Expected)
              $item = Get-Item -LiteralPath $Path -Force -ErrorAction Stop
              if ($item.LinkType -ne 'SymbolicLink') {
                  throw "$Path is not a symlink"
              }
              $target = @($item.Target)[0]
              $actualResolved = (Resolve-Path -LiteralPath $target -ErrorAction Stop).Path
              $expectedResolved = (Resolve-Path -LiteralPath $Expected -ErrorAction Stop).Path
              if ($actualResolved -ne $expectedResolved) {
                  throw "$Path points to $actualResolved, expected $expectedResolved"
              }
          }
          function Assert-ContentEqual {
              param([string]$Path, [string]$Expected)
              if (-not (Test-Path -LiteralPath $Path)) {
                  throw "$Path does not exist"
              }
              $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $Path).Hash
              $expectedHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $Expected).Hash
              if ($actualHash -ne $expectedHash) {
                  throw "$Path content differs from $Expected"
              }
          }
          function Invoke-NvimChecked {
              param([string]$Name, [string[]]$NvimArgs)
              $log = Join-Path $env:RUNNER_TEMP "nvim-$Name.log"
              $global:LASTEXITCODE = 0
              & nvim --headless @NvimArgs 2>&1 | Tee-Object -FilePath $log
              if ($LASTEXITCODE -ne 0) {
                  throw "nvim $Name exited $LASTEXITCODE"
              }
              # nvim's exit code ($LASTEXITCODE, checked above) is the real signal;
              # deprecated-API usage is guarded by invariants_test.sh. $log kept for logs.
          }
          function Assert-MasonTool {
              param([string]$Name, [string[]]$FileNames)
              $masonBin = Join-Path $env:LOCALAPPDATA 'nvim-data\mason\bin'
              foreach ($fileName in $FileNames) {
                  if (Test-Path -LiteralPath (Join-Path $masonBin $fileName)) {
                      return
                  }
              }
              throw "Mason did not install $Name into $masonBin"
          }
          $nvim = Get-Command nvim -ErrorAction SilentlyContinue
          if (-not $nvim) {
              throw 'nvim is not on PATH'
          }
          if (-not (Get-Command lazygit -ErrorAction SilentlyContinue)) {
              throw 'lazygit is not on PATH'
          }
          if (-not (Get-Command cmake -ErrorAction SilentlyContinue)) {
              throw 'cmake is not on PATH'
          }
          if (-not (Get-Command lsd -ErrorAction SilentlyContinue)) {
              throw 'lsd is not on PATH'
          }
          $nvimLine = & nvim --version | Select-Object -First 1
          if ($nvimLine -notmatch '^NVIM v(0\.1[2-9]|0\.[2-9][0-9]|[1-9]\.)') {
              throw "nvim version is below 0.12: $nvimLine"
          }
          $repo = (Resolve-Path -LiteralPath '.').Path
          $nvimTarget = Join-Path $env:LOCALAPPDATA 'nvim'
          Assert-NvimSymlink -Path $nvimTarget -Expected (Join-Path $repo 'nvim')
          Assert-ContentEqual -Path (Join-Path $nvimTarget 'init.lua') -Expected (Join-Path $repo 'nvim\init.lua')
          Assert-ContentEqual -Path (Join-Path $env:USERPROFILE '.config\starship.toml') -Expected (Join-Path $repo 'starship\starship.toml')
          Assert-ContentEqual -Path (Join-Path $env:USERPROFILE '.tmux.conf') -Expected (Join-Path $repo 'tmux\tmux.conf')
          Assert-ContentEqual -Path (Join-Path $env:USERPROFILE '.tmux.windows.conf') -Expected (Join-Path $repo 'tmux\tmux.windows.conf')
          Assert-ContentEqual -Path $PROFILE -Expected (Join-Path $repo 'shells\powershell_profile.ps1')
          Assert-ContentEqual -Path (Join-Path $env:LOCALAPPDATA 'lazygit\config.yml') -Expected (Join-Path $repo 'lazygit\config.windows.yml')
          Invoke-NvimChecked -Name lazy -NvimArgs @('+Lazy! restore', '+qa')
          $env:DOTFILES_TREESITTER_SYNC_INSTALL = '1'
          Invoke-NvimChecked -Name treesitter -NvimArgs @('-u', ((Join-Path $repo 'nvim\init.lua') -replace '\\', '/'), '-c', "lua require('lazy').load({ plugins = { 'nvim-treesitter' } })", '+qa')
          Remove-Item Env:DOTFILES_TREESITTER_SYNC_INSTALL
          Invoke-NvimChecked -Name mason -NvimArgs @('+MasonToolsInstallSync', '+qa')
          Assert-MasonTool -Name 'lua-language-server' -FileNames @('lua-language-server.cmd', 'lua-language-server.exe', 'lua-language-server')
          Assert-MasonTool -Name 'stylua' -FileNames @('stylua.cmd', 'stylua.exe', 'stylua')
          # powershell_es is the Windows-only LSP target. The Tier 2 smoke enforces
          # it (fails if pwsh or the PSES bundle is missing); assert the same
          # preconditions here too so a setup regression has a clear, early locus.
          if (-not (Get-Command pwsh -ErrorAction SilentlyContinue)) {
              throw 'pwsh is not on PATH (setup.ps1 -All should install PowerShell 7)'
          }
          $psesDir = Join-Path $env:LOCALAPPDATA 'nvim-data\mason\packages\powershell-editor-services'
          if (-not (Test-Path -LiteralPath $psesDir)) {
              throw "Mason did not install powershell-editor-services into $psesDir"
          }
          # Tier 2 language smoke: parser support, Tree-sitter captures, AND LSP-attach,
          # both STRICT (see lsp_smoke.lua). On Windows this is where powershell_es
          # is actually enforced (pwsh + PSES bundle present). cquit on any failure
          # -> Invoke-NvimChecked throws.
          $initLua = (Join-Path $repo 'nvim\init.lua') -replace '\\', '/'
          $smokeLua = (Join-Path $repo 'tests\nvim\lsp_smoke.lua') -replace '\\', '/'
          $env:DOTFILES_LSP_SMOKE = 'strict'
          Invoke-NvimChecked -Name lsp-smoke -NvimArgs @('-u', $initLua, '-c', "luafile $smokeLua", '+qa')
          Remove-Item Env:DOTFILES_LSP_SMOKE

  wsl2-canary:
    name: setup.sh / WSL2 Ubuntu-24.04 (best-effort canary)
    # Best-effort only: run on the nightly schedule + manual dispatch, never on PRs.
    # Hosted runners cannot give a reliable WSL2 gate, so running it on PRs only
    # produces a perpetual red (non-required) check. Off PRs = clean PR status while
    # keeping the nightly signal. continue-on-error keeps a flaky nightly from
    # marking the whole scheduled run failed.
    if: github.event_name != 'pull_request'
    runs-on: windows-2025
    timeout-minutes: 90
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: Vampire/setup-wsl@d1da7f2c0322a5ee4f24975344f67fc0f5baf364 # v7.0.0
        with:
          distribution: Ubuntu-24.04
          wsl-version: 2
          use-cache: "true"
          update: "true"
          additional-packages: git ca-certificates curl bash sudo
          wsl-shell-user: dotfiles

      - name: Run setup.sh inside WSL2
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          repo="$(wslpath "$GITHUB_WORKSPACE")"
          cd "$repo"
          ./setup.sh --all 2>&1 | tee /tmp/dotfiles-wsl2-setup.log
          if grep -Fq "skipped: Phase 3-5" /tmp/dotfiles-wsl2-setup.log; then
            echo "setup.sh skipped Phase 3-5" >&2
            exit 1
          fi
          if grep -Eq '^[[:space:]]*FAIL:' /tmp/dotfiles-wsl2-setup.log; then
            echo "setup.sh emitted a FAIL marker" >&2
            exit 1
          fi
          command -v nvim >/dev/null 2>&1
          command -v lazygit >/dev/null 2>&1
          command -v cmake >/dev/null 2>&1
          command -v lsd >/dev/null 2>&1
          test -r "$HOME/.local/share/dotfiles/zsh-plugins/fzf-tab/fzf-tab.plugin.zsh"
          test -r "$HOME/.local/share/dotfiles/zsh-plugins/zsh-autosuggestions/zsh-autosuggestions.zsh"
          nvim --version | head -n 1
