name: nix

# Validates the enforced POSIX Nix layer (flake.nix + committed flake.lock) on
# Ubuntu and macOS. These matrix contexts are checked into the required-status
# sources because setup.sh now depends on Nix for macOS/Linux/WSL provisioning.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: nix flake check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26]
        include:
          # Non-required runtime proof for the public Intel activation path.
          # Keep it outside the required-context os list until the staged check
          # migration in UGR-020 has completed.
          - os: macos-26-intel
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Nix (flakes enabled)
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: nix flake check
        run: nix flake check --print-build-logs
      - name: nix files are nixpkgs-fmt formatted
        run: nix fmt -- --check flake.nix nix/
      - name: nix-darwin + setup integration assertions
        run: bash tests/nix/run_all.sh
