# Rose Pine status theme -- "minimal": muted bar, ONLY the active window pops.
# Everything is low-key grey (muted/subtle); the current window is bright text.
# Good if you want the bar to recede and just glance at the active window.
#
# Try it live (instant, no restart):
#   tmux source-file ~/dotfiles/tmux/themes/minimal.conf
# Revert to the committed config:
#   prefix + r        (Ctrl-b then r -- re-sources ~/.tmux.conf)
#
# Note: muted #6e6a86 is low-contrast (~3.4:1) by design here -- that is the
# "recede" look. Bump inactive to subtle #908caa if you want it more legible.

set -g status-style              "fg=#6e6a86,bg=#191724"
set -g status-left  "#[fg=#908caa,bold] #S #[fg=#6e6a86,nobold]│ "
set -g status-right "#[fg=#6e6a86] %a %d %b #[fg=#908caa] %H:%M "
setw -g window-status-format         " #I:#W#F "
setw -g window-status-style          "fg=#6e6a86,bg=#191724"
setw -g window-status-current-format "#[fg=#e0def4,bold] #I:#W#F #[default]"
set -g message-style          "fg=#6e6a86,bg=#191724"
