# Rose Pine status theme -- "teal": pine/teal status AND inactive windows
# (inactive is unset, so it inherits the pine status color), gold active, iris
# session, foam date, gold time. The previous default; the only difference from
# the committed "cool" default is that inactive windows are teal here, not iris.
#
# Try it live (instant, no restart):
#   tmux source-file ~/dotfiles/tmux/themes/teal.conf     # adjust path to your clone
# Revert to the committed (cool) config:
#   prefix + r        (Ctrl-b then r -- re-sources ~/.tmux.conf)

set -g status-style              "fg=#31748f,bg=#191724"
set -g status-left  "#[fg=#c4a7e7,bold] #S #[fg=#908caa,nobold]│ "
set -g status-right "#[fg=#9ccfd8] %a %d %b #[fg=#f6c177] %H:%M "
setw -g window-status-format         " #I:#W#F "
setw -gu window-status-style
setw -g window-status-current-format "#[fg=#f6c177,bold] #I:#W#F #[default]"
set -g message-style          "fg=#6e6a86,bg=#191724"
