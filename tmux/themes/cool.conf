# Rose Pine status theme -- "cool": iris inactive windows, foam date, gold time.
# A cool purple/teal bar with warm gold accents (close to the shipped default).
#
# Try it live (instant, no restart):
#   tmux source-file ~/dotfiles/tmux/themes/cool.conf
# Revert to the committed config:
#   prefix + r        (Ctrl-b then r -- re-sources ~/.tmux.conf)
#
# bg stays base #191724 (the terminal background); under WT opacity 95 the bar is
# see-through, so what you are tuning here is the TEXT colors.

set -g status-style              "fg=#31748f,bg=#191724"
set -g status-left  "#[fg=#c4a7e7,bold] #S #[fg=#908caa,nobold]│ "
set -g status-right "#[fg=#9ccfd8] %a %d %b #[fg=#f6c177] %H:%M "
setw -g window-status-format         " #I:#W#F "
setw -g window-status-style          "fg=#c4a7e7,bg=#191724"
setw -g window-status-current-format "#[fg=#f6c177,bold] #I:#W#F #[default]"
set -g message-style          "fg=#6e6a86,bg=#191724"
