# Rose Pine status theme -- "cool": the COMMITTED default bar. Pine/teal status,
# iris inactive windows, gold active window, iris session, foam date, gold time.
#
# cool is baked into tmux/tmux.conf (one source of truth), NOT duplicated here.
# This snippet just RE-APPLIES the committed config so you can flip back to cool
# the same way you audition warm/teal/minimal -- it is equivalent to `prefix + r`.
#
# Try it live (instant, no restart):
#   tmux source-file ~/dotfiles/tmux/themes/cool.conf
# (or just press prefix + r -- Ctrl-b then r)

source-file ~/.tmux.conf
