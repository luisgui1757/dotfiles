# Rose Pine status theme -- "warm": rose inactive windows, gold session, love time.
# A warm rose/gold bar -- softer and cosier than the cool default.
#
# Try it live (instant, no restart):
#   tmux source-file ~/dotfiles/tmux/themes/warm.conf
# Revert to the committed config:
#   prefix + r        (Ctrl-b then r -- re-sources ~/.tmux.conf)

set -g status-style              "fg=#ebbcba,bg=#191724"
set -g status-left  "#[fg=#f6c177,bold] #S #[fg=#6e6a86,nobold]│ "
set -g status-right "#[fg=#ebbcba] %a %d %b #[fg=#eb6f92] %H:%M "
setw -g window-status-format         " #I:#W#F "
setw -g window-status-style          "fg=#ebbcba,bg=#191724"
setw -g window-status-current-format "#[fg=#f6c177,bold] #I:#W#F #[default]"
set -g message-style          "fg=#908caa,bg=#191724"
