# POSIX overlay -- managed as ~/.tmux.posix.conf by chezmoi on Unix/WSL only.
# It is ABSENT on Windows; main tmux.conf does `source-file -q` on it, so this
# file is invisible to psmux/ConPTY (silent no-op). Keep it POSIX-specific.
#
# Why this lives in its own file: `if-shell` spawns a shell at config-LOAD time.
# Under psmux/ConPTY on Windows that shell never returns -- it hangs the whole
# config load (the pane initializes but never finishes rendering, the orphaned
# probe shells pin CPU, and a conhost leaks per session). On Unix/WSL `if-shell`
# + /bin/sh behave normally, so the native-clipboard probes and the TPM run are
# safe here.
#
# main tmux.conf already binds copy-mode `y` to an OSC52 baseline. These probes
# only RE-bind `y` to the platform's native clipboard CLI when one is installed,
# so a native paste still works even where the terminal swallows OSC52. Order:
# pbcopy (macOS) -> wl-copy (Wayland) -> xclip -> xsel -> win32yank (WSL). Each
# guards on the higher-priority tools being absent so exactly one wins; when
# none exist the OSC52 baseline in tmux.conf stands. tmux-yank (declared below)
# also yanks to the system clipboard when TPM has installed it; these probes are
# the pre-TPM / no-TPM fallback and preserve the existing copy-mode behavior.

# Extended keys: send Ctrl+J distinct from Enter, Ctrl+I distinct from Tab,
# etc. (tmux 3.2+). The *:extkeys terminal-feature flag tells tmux every outer
# terminal can carry the sequence. We deliberately do NOT set
# `extended-keys-format csi-u`: that option only exists on tmux 3.5+ (where
# csi-u is already the default), and older real tmux -- e.g. Ubuntu 24.04's 3.4
# -- aborts that line with `invalid option: extended-keys-format`.
set -s extended-keys on
set -as terminal-features ',*:extkeys'

if-shell 'command -v pbcopy >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && command -v wl-copy >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1 && command -v xclip >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1 && ! command -v xclip >/dev/null 2>&1 && command -v xsel >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel -i -b"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1 && ! command -v xclip >/dev/null 2>&1 && ! command -v xsel >/dev/null 2>&1 && command -v win32yank.exe >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "win32yank.exe -i --crlf"'

# ---- Plugins (TPM) ----------------------------------------------------------
# setup.sh installs these as repo-managed pinned checkouts under this root:
#   tpm             -> tmux-plugins/tpm  (the plugin manager)
#   tmux-sensible   -> tmux-plugins/tmux-sensible
#   tmux-yank       -> tmux-plugins/tmux-yank
#   tmux-resurrect  -> tmux-plugins/tmux-resurrect
#   tmux-continuum  -> tmux-plugins/tmux-continuum
# These are the FUNCTIONAL plugins (sane defaults, clipboard, session
# save/restore). They do NOT own the status bar: the Rose Pine Omer-style bar is
# a repo-owned generated config sourced below, uniform with native-Windows psmux.
# Keep this in the POSIX overlay: TPM is a shell plugin manager and must not be
# executed by native-Windows psmux.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.local/share/dotfiles/tmux-plugins"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Session save/restore, configured canonically. resurrect restores the nvim
# session file; continuum auto-saves every 15 min and auto-restores on start.
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ---- Rose Pine status bar (Omer-shaped, repo-owned generated config) ---------
# The bar is generated by tmux/psmux-rose-pine.ps1 and deployed by chezmoi as
# ~/.tmux.rose-pine.{main,moon,dawn}.conf. We source the selected variant here,
# BEFORE running TPM, so tmux-continuum prepends its (invisible) save trigger to
# the themed status-right instead of the default one. Switch flavor live with:
#   tmux set -g @rosepine-variant moon; tmux source-file ~/.tmux.posix.conf
# Use `set -go` (only-if-unset) so a live `set -g @rosepine-variant moon` is not
# clobbered back to main every time this overlay is re-sourced. Matches Windows.
set -go @rosepine-variant 'main'
%if "#{==:#{@rosepine-variant},moon}"
source-file ~/.tmux.rose-pine.moon.conf
%elif "#{==:#{@rosepine-variant},dawn}"
source-file ~/.tmux.rose-pine.dawn.conf
%else
source-file ~/.tmux.rose-pine.main.conf
%endif

# Initialize TPM last so plugins load after the theme is in place. Guarded on the
# repo-managed tpm binary existing, so a machine without plugins still loads.
if-shell -b 'test -x "$HOME/.local/share/dotfiles/tmux-plugins/tpm/tpm"' \
    'run-shell "$HOME/.local/share/dotfiles/tmux-plugins/tpm/tpm"'
