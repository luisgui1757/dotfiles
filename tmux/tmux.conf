# tmux config — Rose Pine, vi-mode, true-color, Ghostty/WT-friendly.

# ---- Terminal capabilities ---------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm-ghostty:RGB"
set -ga terminal-overrides ",alacritty:RGB"
set -ga terminal-overrides ",*256col*:RGB"

# Focus events so nvim's :autoread/gitsigns react when you tab back.
set -g focus-events on

# Extended keys: send Ctrl+J distinct from Enter, Ctrl+I distinct from Tab,
# etc. (tmux 3.2+). The *:extkeys terminal-feature flag tells tmux every outer
# terminal can carry the sequence. We deliberately do NOT set
# `extended-keys-format csi-u`: that option only exists on tmux 3.5+ (where
# csi-u is already the default), and older real tmux -- e.g. Ubuntu 24.04's 3.4
# -- aborts that line with `invalid option: extended-keys-format`. Harmless on
# psmux (it doesn't implement these options; unknown options are warnings there).
set -s extended-keys on
set -as terminal-features ',*:extkeys'

# ---- Behavior ----------------------------------------------------------------
# Mouse ON in tmux/psmux on purpose. Nvim keeps its own mouse off (see
# `vim.opt.mouse = ""` + the three defensive options in vim-options.lua),
# but everywhere else we want pane-switch on click, scroll-wheel into
# copy-mode, drag-resize on the pane border, and Windows Terminal-native
# selection (which psmux's mouse-selection layer also relays).
set -g mouse on
set -g escape-time 10
set -g history-limit 50000
set -g status-keys vi
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "tmux:#S #W"
set -g allow-rename off
set -g aggressive-resize on

# ---- Prefix: C-b (default; macOS eats C-Space for input-source switching) ----
set -g prefix C-b
bind C-b send-prefix

# ---- Pane management ---------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H if -F "#{==:#{window_index},#{window_base_index}}" "display-message 'no window left'" "swap-window -t -1"
bind L if -F "#{==:#{window_index},#{session_windows}}" "display-message 'no window right'" "swap-window -t +1"
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# ---- Copy-mode (vi-style, with real system-clipboard plumbing) ---------------
# OSC52 broadcasts copies via the terminal — works across SSH and into the
# host clipboard from Ghostty/Windows Terminal without any helper installed.
set -g set-clipboard on

bind -T copy-mode-vi v send -X begin-selection

# Baseline copy: OSC52 only (set-clipboard is on). NO shell runs at config-load
# time here, so psmux/ConPTY on Windows never spawns a hanging `if-shell`
# subshell while parsing this file. The native-clipboard CLI probes
# (pbcopy/wl-copy/xclip/xsel/win32yank) use `if-shell`, which MUST NOT run on
# Windows -- psmux's if-shell never returns under ConPTY, hanging the whole
# config load (the pane initializes but never finishes rendering, orphaned probe
# shells pin CPU, and a conhost leaks per session). So those probes live in the
# POSIX-only tmux.posix.conf overlay sourced below -- present as
# ~/.tmux.posix.conf on Unix/WSL, absent on Windows (`-q` => silent no-op there).
# On POSIX the overlay RE-binds `y` to the native CLI when one is installed;
# otherwise this OSC52 baseline stands. Canonical fix: guard the block, do not
# fork the config.
bind -T copy-mode-vi y send -X copy-pipe-and-cancel

# ---- Status bar --------------------------------------------------------------
# The shared file keeps placement only. Platform overlays own rendering:
# tmux.posix.conf loads TPM + the official rose-pine/tmux plugin; the Windows
# psmux overlay loads PPM + psmux-theme-rosepine. Keeping the rich bar in the
# overlays avoids running Bash/PowerShell plugin managers on the wrong platform.
set -g status-position top

# POSIX overlay: native clipboard probes plus TPM/rose-pine/tmux. It is managed
# by chezmoi on Unix/WSL only and absent on native Windows. Keep the path
# unquoted: psmux is stricter than tmux about quoted tilde expansion.
source-file -q ~/.tmux.posix.conf

# Windows/psmux overlay: managed by chezmoi on Windows only. `-q` makes this
# a silent no-op on Unix where the file is absent, so the same tmux.conf stays
# cross-platform. See tmux/tmux.windows.conf for what it sets. Keep the path
# unquoted for psmux tilde expansion.
source-file -q ~/.tmux.windows.conf
